<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Card</title>

    <style>
      body {
        font-family: Arial, sans-serif;
      }

      h1 {
        text-align: center;
      }

      main {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .pricing-card {
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 20px;
        width: 250px;
        text-align: center;
      }

      button {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <h1>Pricing Plans</h1>

    <main>
      <div class="pricing-card">
        <h2>Free Plan</h2>
        <p>For personal</p>

        <h3>$0</h3>

        <p>1 User</p>
        <p>4 Web mails</p>
        <p>Responsive Website</p>
        <p>Free SSL</p>

        <button type="button">Subscribe Now</button>
      </div>

      <div class="pricing-card">
        <h2>Basic Plan</h2>
        <p>For small business</p>

        <h3>$29</h3>

        <p>4 Users</p>
        <p>10 Web mails</p>
        <p>Responsive Website</p>
        <p>Free SSL</p>

        <button type="button">Subscribe Now</button>
      </div>

      <div class="pricing-card">
        <h2>Pro Plan</h2>
        <p>For enterprise</p>

        <h3>$49</h3>

        <p>Unlimited Users</p>
        <p>Unlimited Web mails</p>
        <p>Responsive Website</p>
        <p>Free SSL + SEO</p>

        <button type="button">Subscribe Now</button>
      </div>
    </main>
  </body>
</html>

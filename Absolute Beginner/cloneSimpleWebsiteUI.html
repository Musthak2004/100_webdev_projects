<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone-Simple-Website-UI</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }
      body {
        background-color: #f4f4f4;
        font-family: "Times New Roman", Times, serif;
      }

      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 40px;
      }

      .nav-links ul {
        display: flex;
        list-style: none;
        gap: 40px;
      }

      .nav-links a {
        text-decoration: none;
        color: #333;
        font-size: 16px;
      }

      .nav-links .logo-link {
        font-size: 25px;
        font-weight: bold;
        color: #000;
      }

      .nav-links a:hover {
        color: #007bff;
      }

      .nav-bar button {
        margin-left: 10px;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .main-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 60px 80px;
        color: #000;
      }

      .text-container {
        max-width: 50%;
      }

      .span-text {
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1px;
        opacity: 0.5;
      }

      .text-container h1 {
        font-size: 48px;
        line-height: 1.2;
        margin: 15px 0;
      }

      .text-container p {
        font-size: 18px;
        margin-bottom: 25px;
        opacity: 0.9;
      }

      .text-container button {
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        margin-right: 15px;
        transition: transform 0.2s;
      }

      .text-container button:first-of-type {
        background-color: #ffffff;
        color: #007bff;
      }

      .text-container button:last-of-type {
        background-color: transparent;
        color: #333;
        border: 2px solid #ffffff;
      }

      .text-container button:hover {
        transform: translateY(-2px);
      }

      .img-container img {
        border-radius: 8px;
        object-fit: cover;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      .footer-container {
        padding: 40px 30px;
        text-align: center;
      }

      .footer-container p {
        color: #666;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="head-container">
      <div class="nav-bar">
        <nav class="nav-links">
          <ul>
            <li>
              <a class="logo-link" href="#">Lando</a>
            </li>
          </ul>
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
        <div class="auth-buttons">
          <button style="background: none; color: #333">Log in</button>
          <button style="background: #007bff; color: white">Sign up</button>
        </div>
      </div>
      <div class="main-container">
        <div class="text-container">
          <p><span class="span-text">- FREE 30 DAYS TRIAL</span></p>
          <h1>The best way <br> to showcase <br> your project.</h1>
          <p>Here you can put a short description about your project.</p>
          <button>Try for free</button>
          <button>See how it works</button>
        </div>
        <div class="img-container">
          <img
            height="300"
            width=350"
            src="../images/sander-traa-zJytRBYiBM4-unsplash.jpg"
            alt=""
          />
        </div>
      </div>
      <div class="footer-container">
        <div class="footer">
          <p>Trusted by individuals and teams at the worlds <br> best companies</p>
        </div>
      </div>
    </div>
  </body>
</html>

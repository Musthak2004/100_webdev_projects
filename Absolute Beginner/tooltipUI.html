<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=+, initial-scale=1.0" />
    <title>Tooltip UI</title>
    <style>
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
      }

      .tooltip {
        position: relative;
        display: inline-block;
        cursor: pointer;
      }

      .tooltip-text {
        visibility: hidden;
        position: absolute;
        bottom: 130px;
        left: 50px;
        transform: translateX(-50%);

        background-color: black;
        color: white;
        padding: 8px 12px;
        border-radius: 5px;
        white-space: nowrap;

        opacity: 0;
        transition: opacity 0.3s;
      }

      .tooltip:hover .tooltip-text {
        visibility: visible;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="tooltip">
      Hover Me
      <span class="tooltip-text">Hello Nanba!</span>
    </div>
  </body>
</html>

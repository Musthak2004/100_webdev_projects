<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page UI</title>

    <style>
      body {
        font-family: Arial, sans-serif;
      }

      #header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #nav-links a {
        margin-right: 15px;
        text-decoration: none;
      }

      .hero-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 40px;
      }

      img {
        width: 400px;
      }

      footer {
        text-align: center;
        margin-top: 40px;
      }
    </style>
  </head>

  <body>
    <header id="header-row">
      <h1>Lando</h1>

      <nav id="nav-links">
        <a href="#home">Home</a>
        <a href="#pricing">Pricing</a>
        <a href="#about">About us</a>
        <a href="#contact">Contact</a>
      </nav>

      <div>
        <button type="button">Login</button>
        <button type="button">Sign up</button>
      </div>
    </header>

    <main>
      <div class="hero-section">
        <section>
          <p>- FREE 30 DAYS TRIAL</p>

          <h2>The best way to showcase your project.</h2>

          <p>Here you can put a short description about your project.</p>

          <button type="button">Try for free</button>
          <button type="button">See how it works</button>
        </section>

        <section>
          <img src="https://via.placeholder.com/400" alt="Project preview" />
        </section>
      </div>
    </main>

    <footer>
      <p>Trusted by individuals and teams at the world's best companies</p>

      <p>&copy; All rights reserved</p>
    </footer>
  </body>
</html>

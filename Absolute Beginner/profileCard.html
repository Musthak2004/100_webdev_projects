<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }

      #profile-card {
        width: 300px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        text-align: center;
      }

      img {
        width: 150px;
        border-radius: 50%;
      }

      a {
        margin: 0 10px;
      }
    </style>
  </head>

  <body>
    <div id="profile-card">
      <img
        src="https://via.placeholder.com/150"
        alt="Muhammad Musthak profile photo"
      />

      <h1>Muhammad Musthak</h1>

      <h2>Software Engineer</h2>

      <hr />

      <p>
        I chose the software field because I love solving real-world problems
        through technology.
      </p>

      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
      <a href="#">Facebook</a>
    </div>
  </body>
</html>

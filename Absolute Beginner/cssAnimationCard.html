<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f4f4f4;
      }

      .card {
        width: 300px;
        background-color: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: -4px 10px rgba(0, 0, 0, 0.2);
        transition:
          transform 0.4s ease,
          box-shadow 0.4s ease;
      }

      .card:hover {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }

      .card img {
        width: 100%;
        display: block;
      }

      .card-content {
        padding: 20px;
      }

      .card h2 {
        margin-bottom: 10px;
      }

      .card p {
        color: #555;
        margin-bottom: 15px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        padding: 10px 20px;
        background: black;
        color: white;
        border-radius: 5px;
        transition: background 0.3s ease;
      }

      .btn:hover {
        background: #444;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="https://picsum.photos/300/200" alt="Card Image" />
      <div class="card-content">
        <h2>Web Development</h2>
        <p>Learn HTML, CSS and JavaScript by building real projects.</p>

        <a href="#" class="btn">Read More</a>
      </div>
    </div>
  </body>
</html>

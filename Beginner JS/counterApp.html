<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: #16213e;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      h1 {
        color: #e94560;
        font-size: 32px;
        margin-bottom: 20px;
      }

      #count {
        font-size: 80px;
        font-weight: bold;
        color: #fff;
        margin: 20px 0;
        transition: 0.2s;
      }

      .buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      button {
        font-size: 24px;
        padding: 12px 30px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      button:hover {
        transform: scale(1.1);
      }

      #decreaseBtn {
        background: #e94560;
        color: white;
      }

      #resetBtn {
        background: #533483;
        color: white;
      }

      #increaseBtn {
        background: #0f3460;
        color: white;
      }

      button:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Counter App</h1>
      <div id="count">0</div>
      <div class="buttons">
        <button id="decreaseBtn">-</button>
        <button id="resetBtn">Reset</button>
        <button id="increaseBtn">+</button>
      </div>
    </div>

    <script>
      // Get the count element
      const countDisplay = document.getElementById("count");

      // Get all three buttons
      const decreaseBtn = document.getElementById("decreaseBtn");
      const resetBtn = document.getElementById("resetBtn");
      const increaseBtn = document.getElementById("increaseBtn");

      // Starting value
      let count = 0;

      // Update the display whenever count changes
      function updateDisplay() {
        countDisplay.textContent = count;
      }

      // Increase button: add 1
      increaseBtn.addEventListener("click", function () {
        count++;
        updateDisplay();
      });

      // Decrease button: subtract 1
      decreaseBtn.addEventListener("click", function () {
        count--;
        updateDisplay();
      });

      // Reset button: back to 0
      resetBtn.addEventListener("click", function () {
        count = 0;
        updateDisplay();
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        padding: 50px;
        border-radius: 25px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 550px;
        width: 90%;
      }

      h1 {
        color: #f72585;
        font-size: 34px;
        margin-bottom: 8px;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .subtitle {
        color: #aaa;
        font-size: 16px;
        margin-bottom: 40px;
        letter-spacing: 2px;
        font-weight: 300;
      }

      .input-section {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        text-align: left;
      }

      .input-group label {
        color: #b0b0ff;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 1px;
      }

      .input-group input {
        font-size: 18px;
        padding: 14px 18px;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        outline: 2px solid transparent;
        transition: 0.3s;
        font-family: inherit;
      }

      .input-group input:focus {
        outline: 2px solid #f72585;
        background: rgba(255, 255, 255, 0.12);
      }

      .input-group input::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
      }

      .calc-btn {
        font-size: 20px;
        padding: 16px 40px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        background: linear-gradient(135deg, #f72585, #b5179e);
        color: #fff;
        transition: 0.3s;
        letter-spacing: 1px;
        margin-top: 10px;
      }

      .calc-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(247, 37, 133, 0.4);
      }

      .calc-btn:active {
        transform: scale(0.97);
      }

      .result-section {
        margin-top: 30px;
        padding: 25px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: none;
      }

      .result-section.visible {
        display: block;
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .age-big {
        font-size: 60px;
        font-weight: 800;
        color: #f72585;
        text-shadow: 0 0 30px rgba(247, 37, 133, 0.3);
        line-height: 1.2;
      }

      .age-big span {
        font-size: 24px;
        color: #b0b0ff;
        font-weight: 400;
      }

      .age-details {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .age-detail-item {
        text-align: center;
      }

      .age-detail-item .number {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
      }

      .age-detail-item .label {
        font-size: 14px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
      }

      .next-birthday {
        margin-top: 20px;
        padding: 15px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .next-birthday p {
        color: #b0b0ff;
        font-size: 16px;
      }

      .next-birthday .days-left {
        color: #4cc9f0;
        font-weight: 700;
        font-size: 20px;
      }

      .error {
        color: #f72585;
        font-size: 16px;
        margin-top: 15px;
        display: none;
      }

      .error.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Age Calculator</h1>
      <p class="subtitle">Find out your exact age</p>

      <div class="input-section">
        <div class="input-group">
          <label for="dobInput">Date of Birth</label>
          <input type="date" id="dobInput" />
        </div>
        <button class="calc-btn" id="calcBtn">Calculate Age</button>
      </div>

      <div class="error" id="error">Please select a valid date of birth.</div>

      <div class="result-section" id="resultSection">
        <div class="age-big" id="ageYears">0 <span>years</span></div>

        <div class="age-details">
          <div class="age-detail-item">
            <div class="number" id="ageMonths">0</div>
            <div class="label">Months</div>
          </div>
          <div class="age-detail-item">
            <div class="number" id="ageWeeks">0</div>
            <div class="label">Weeks</div>
          </div>
          <div class="age-detail-item">
            <div class="number" id="ageDays">0</div>
            <div class="label">Days</div>
          </div>
          <div class="age-detail-item">
            <div class="number" id="ageHours">0</div>
            <div class="label">Hours</div>
          </div>
          <div class="age-detail-item">
            <div class="number" id="ageMinutes">0</div>
            <div class="label">Minutes</div>
          </div>
        </div>

        <div class="next-birthday">
          <p>Next birthday in <span class="days-left" id="daysUntilBirthday">--</span> days</p>
        </div>
      </div>
    </div>

    <script>
      const dobInput = document.getElementById("dobInput");
      const calcBtn = document.getElementById("calcBtn");
      const resultSection = document.getElementById("resultSection");
      const error = document.getElementById("error");

      const ageYears = document.getElementById("ageYears");
      const ageMonths = document.getElementById("ageMonths");
      const ageWeeks = document.getElementById("ageWeeks");
      const ageDays = document.getElementById("ageDays");
      const ageHours = document.getElementById("ageHours");
      const ageMinutes = document.getElementById("ageMinutes");
      const daysUntilBirthday = document.getElementById("daysUntilBirthday");

      dobInput.max = new Date().toISOString().split("T")[0];

      function calculateAge() {
        const dobValue = dobInput.value;
        if (!dobValue) {
          error.classList.add("visible");
          resultSection.classList.remove("visible");
          return;
        }

        error.classList.remove("visible");

        const birthDate = new Date(dobValue);
        const now = new Date();

        if (birthDate >= now) {
          error.textContent = "Date of birth must be in the past.";
          error.classList.add("visible");
          resultSection.classList.remove("visible");
          return;
        }

        error.classList.remove("visible");
        error.textContent = "Please select a valid date of birth.";

        let years = now.getFullYear() - birthDate.getFullYear();
        let months = now.getMonth() - birthDate.getMonth();
        let days = now.getDate() - birthDate.getDate();

        if (days < 0) {
          months--;
          const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
          days += prevMonth.getDate();
        }

        if (months < 0) {
          years--;
          months += 12;
        }

        const diffMs = now - birthDate;
        const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const totalWeeks = Math.floor(totalDays / 7);
        const totalHours = Math.floor(diffMs / (1000 * 60 * 60));
        const totalMinutes = Math.floor(diffMs / (1000 * 60));

        ageYears.innerHTML = `${years} <span>years</span>`;
        ageMonths.textContent = months;
        ageWeeks.textContent = totalWeeks.toLocaleString();
        ageDays.textContent = totalDays.toLocaleString();
        ageHours.textContent = totalHours.toLocaleString();
        ageMinutes.textContent = totalMinutes.toLocaleString();

        const nextBirthday = new Date(now.getFullYear(), birthDate.getMonth(), birthDate.getDate());
        if (nextBirthday < now) {
          nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
        }
        const daysUntil = Math.ceil((nextBirthday - now) / (1000 * 60 * 60 * 24));
        daysUntilBirthday.textContent = daysUntil;

        resultSection.classList.add("visible");
      }

      calcBtn.addEventListener("click", calculateAge);

      dobInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          calculateAge();
        }
      });
    </script>
  </body>
</html>

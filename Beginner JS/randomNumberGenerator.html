<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Number Generator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: #16213e;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        text-align: center;
        max-width: 500px;
        width: 90%;
      }

      h1 {
        color: #e94560;
        font-size: 32px;
        margin-bottom: 20px;
      }

      .range-settings {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      label {
        color: #fff;
        font-size: 18px;
      }

      input {
        font-size: 18px;
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: #0f3460;
        color: #fff;
        width: 80px;
        text-align: center;
      }

      input:focus {
        outline: 2px solid #e94560;
      }

      .number-display {
        font-size: 80px;
        font-weight: bold;
        color: #fff;
        margin: 30px 0;
        padding: 20px;
        background: #0f3460;
        border-radius: 15px;
        transition: 0.3s;
        overflow-wrap: break-word;
        word-break: break-all;
      }

      .buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        font-size: 20px;
        padding: 12px 30px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      button:hover {
        transform: scale(1.1);
      }

      #generateBtn {
        background: #e94560;
        color: white;
      }

      #resetRangeBtn {
        background: #533483;
        color: white;
      }

      button:active {
        transform: scale(0.95);
      }

      .message {
        margin-top: 20px;
        font-size: 18px;
        color: #e94560;
        min-height: 27px;
      }

      .random-history {
        margin-top: 20px;
        padding: 15px;
        background: #0f3460;
        border-radius: 10px;
        text-align: left;
      }

      .random-history h3 {
        color: #fff;
        font-size: 20px;
        margin-bottom: 10px;
      }

      .history-list {
        max-height: 150px;
        overflow-y: auto;
      }

      .history-item {
        color: #ccc;
        font-size: 16px;
        padding: 5px 0;
        border-bottom: 1px solid #1a1a2e;
      }

      .history-item:last-child {
        border-bottom: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Random Number Generator</h1>

      <div class="range-settings">
        <div class="input-group">
          <label for="minInput">Min:</label>
          <input type="number" id="minInput" value="1" min="-1000" max="1000" />
        </div>
        <div class="input-group">
          <label for="maxInput">Max:</label>
          <input type="number" id="maxInput" value="100" min="-1000" max="1000" />
        </div>
      </div>

      <div id="numberDisplay" class="number-display">?</div>

      <div class="buttons">
        <button id="generateBtn">Generate Random Number</button>
        <button id="resetRangeBtn">Reset Range</button>
      </div>

      <div id="message" class="message" aria-live="polite"></div>

      <div class="random-history">
        <h3>Recent Numbers</h3>
        <div id="historyList" class="history-list"></div>
      </div>
    </div>

    <script>
      // Get DOM elements
      const numberDisplay = document.getElementById("numberDisplay");
      const minInput = document.getElementById("minInput");
      const maxInput = document.getElementById("maxInput");
      const generateBtn = document.getElementById("generateBtn");
      const resetRangeBtn = document.getElementById("resetRangeBtn");
      const message = document.getElementById("message");
      const historyList = document.getElementById("historyList");

      // Keep track of recent numbers (max 10)
      let recentNumbers = [];

      // Track message timeout so we can cancel it
      let messageTimeout = null;

      // Function to validate range and generate random number
      function generateRandomNumber() {
        // Get values from inputs
        let min = parseInt(minInput.value);
        let max = parseInt(maxInput.value);

        // Validate inputs
        if (isNaN(min) || isNaN(max)) {
          showMessage("Please enter valid numbers!");
          return;
        }

        // Enforce HTML input bounds
        const minBound = parseInt(minInput.min);
        const maxBound = parseInt(maxInput.max);
        if (min < minBound || max > maxBound) {
          showMessage(`Use values between ${minBound} and ${maxBound}`);
          return;
        }

        if (min > max) {
          showMessage("Min value cannot be greater than Max value!");
          return;
        }

        if (min === max) {
          showMessage("Min and Max cannot be the same!");
          return;
        }

        // Generate random number
        const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;

        // Update display with dynamic font size
        numberDisplay.textContent = randomNumber;
        numberDisplay.style.fontSize = "80px";
        const digits = randomNumber.toString().replace("-", "").length;
        if (digits > 4) {
          numberDisplay.style.fontSize = `${Math.max(30, 80 - (digits - 4) * 10)}px`;
        }
        numberDisplay.style.background = "#e94560";

        // Add to history
        addToHistory(randomNumber);

        // Show success message
        showMessage(`Generated: ${randomNumber} (Range: ${min} - ${max})`);

        // Reset background after animation
        setTimeout(() => {
          numberDisplay.style.background = "#0f3460";
        }, 300);
      }

      // Function to add number to history
      function addToHistory(number) {
        // Add to beginning of array
        recentNumbers.unshift(number);

        // Keep only last 10 numbers
        if (recentNumbers.length > 10) {
          recentNumbers = recentNumbers.slice(0, 10);
        }

        // Update history display
        updateHistoryDisplay();
      }

      // Function to update history display
      function updateHistoryDisplay() {
        historyList.innerHTML = "";
        recentNumbers.forEach((num, index) => {
          const item = document.createElement("div");
          item.className = "history-item";
          item.textContent = `#${index + 1}: ${num}`;
          historyList.appendChild(item);
        });
      }

      // Function to show message
      function showMessage(text) {
        message.textContent = text;
        message.style.color = "#e94560";

        // Cancel previous timeout to avoid race condition
        if (messageTimeout) {
          clearTimeout(messageTimeout);
        }

        // Clear message after 3 seconds
        messageTimeout = setTimeout(() => {
          message.textContent = "";
          messageTimeout = null;
        }, 3000);
      }

      // Function to reset range to defaults
      function resetRange() {
        minInput.value = 1;
        maxInput.value = 100;
        showMessage("Range reset to 1 - 100");
      }

      // Event listeners
      generateBtn.addEventListener("click", generateRandomNumber);

      resetRangeBtn.addEventListener("click", resetRange);

      // Allow pressing Enter to generate number
      minInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          generateRandomNumber();
        }
      });

      maxInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          generateRandomNumber();
        }
      });

      // Generate initial number on page load
      generateRandomNumber();
    </script>
  </body>
</html>

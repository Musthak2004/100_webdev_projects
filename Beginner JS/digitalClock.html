<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0a0a23;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        gap: 30px;
      }

      .container {
        background: #1a1a3e;
        padding: 50px 60px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(100, 100, 255, 0.1);
        text-align: center;
        border: 1px solid rgba(100, 100, 255, 0.2);
      }

      h1 {
        color: #8899ff;
        font-size: 28px;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 30px;
        font-weight: 300;
      }

      .clock-display {
        font-size: 90px;
        font-weight: bold;
        color: #00ff88;
        text-shadow: 0 0 20px rgba(0, 255, 136, 0.5), 0 0 40px rgba(0, 255, 136, 0.2);
        font-family: 'Courier New', Courier, monospace;
        letter-spacing: 8px;
        padding: 20px;
        background: #0f0f2e;
        border-radius: 15px;
        border: 1px solid rgba(0, 255, 136, 0.2);
        min-width: 500px;
      }

      .date-display {
        color: #8899ff;
        font-size: 22px;
        margin-top: 20px;
        letter-spacing: 2px;
        font-weight: 300;
      }

      .ampm {
        font-size: 40px;
        color: #ffaa00;
        text-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
        margin-left: 10px;
        vertical-align: super;
      }

      .controls {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        font-size: 18px;
        padding: 12px 30px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
        background: #2a2a5e;
        color: #8899ff;
        border: 1px solid rgba(100, 100, 255, 0.3);
      }

      button:hover {
        transform: scale(1.08);
        background: #3a3a7e;
        box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
      }

      button:active {
        transform: scale(0.95);
      }

      .format-toggle {
        background: #2a2a3e;
        color: #aaa;
        font-size: 14px;
        padding: 20px 30px;
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
      }

      .format-toggle span {
        color: #00ff88;
      }

      .blink {
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Digital Clock</h1>
      <div class="clock-display" id="clockDisplay">
        <span id="hours">00</span>
        <span id="colon" class="blink">:</span>
        <span id="minutes">00</span>
        <span id="colon2" class="blink">:</span>
        <span id="seconds">00</span>
        <span id="ampm" class="ampm"></span>
      </div>
      <div class="date-display" id="dateDisplay"></div>
    </div>

    <div class="controls">
      <button id="toggleFormatBtn">Toggle 12h / 24h</button>
      <button id="toggleSecondsBtn">Hide Seconds</button>
    </div>

    <div class="format-toggle">
      Current Format: <span id="formatLabel">12-hour</span> &nbsp;|&nbsp; Seconds: <span id="secondsLabel">Visible</span>
    </div>

    <script>
      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");
      const ampmEl = document.getElementById("ampm");
      const dateDisplay = document.getElementById("dateDisplay");
      const colonEls = document.querySelectorAll("#colon, #colon2");
      const formatLabel = document.getElementById("formatLabel");
      const secondsLabel = document.getElementById("secondsLabel");

      let is24Hour = false;
      let showSeconds = true;
      let tickCount = 0;

      function updateClock() {
        const now = new Date();

        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        let ampm = "";

        if (!is24Hour) {
          ampm = hours >= 12 ? "PM" : "AM";
          hours = hours % 12 || 12;
        }

        hoursEl.textContent = String(hours).padStart(2, "0");
        minutesEl.textContent = String(minutes).padStart(2, "0");
        secondsEl.textContent = String(seconds).padStart(2, "0");
        ampmEl.textContent = ampm;

        secondsEl.style.display = showSeconds ? "inline" : "none";
        colonEls.forEach((el) => {
          el.style.display = showSeconds ? "inline" : "none";
        });

        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        dateDisplay.textContent = now.toLocaleDateString("en-US", options);

        tickCount++;

        if (tickCount % 10 === 0) {
          ampmEl.style.color = ampmEl.style.color === "rgb(255, 170, 0)" ? "#00ff88" : "#ffaa00";
        }
      }

      function toggleFormat() {
        is24Hour = !is24Hour;
        formatLabel.textContent = is24Hour ? "24-hour" : "12-hour";
        updateClock();
      }

      function toggleSeconds() {
        showSeconds = !showSeconds;
        secondsLabel.textContent = showSeconds ? "Visible" : "Hidden";
        updateClock();
      }

      document.getElementById("toggleFormatBtn").addEventListener("click", toggleFormat);
      document.getElementById("toggleSecondsBtn").addEventListener("click", toggleSeconds);

      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>

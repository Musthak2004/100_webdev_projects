<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert Button</title>
    <style>
      .btn-container {
        display: flex;
        justify-content: center; /* Flexbox use panni standard-aa center panniyachu */
        align-items: center;
        min-height: 100vh; /* Screen-oda center-ku vara fix */
      }

      #alertBtn {
        color: blue;
        cursor: pointer;
        font-size: large;
        padding: 10px 20px;
        border-radius: 5px;
        border: 1px solid blue;
        background-color: white;
        transition: all 0.3s ease;
      }

      #alertBtn:hover {
        background-color: blue;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="btn-container">
      <button id="alertBtn">Click me!</button>
    </div>

    <script>
      const button = document.getElementById("alertBtn");
      button.addEventListener("click", function () {
        alert("Don't touch me!");
      });
    </script>
  </body>
</html>
